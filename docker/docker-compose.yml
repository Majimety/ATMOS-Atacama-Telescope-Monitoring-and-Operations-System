###############################################################################
# ATMOS — Docker Compose (production)
# docker-compose up -d
#
# Services:
#   atmos-api       FastAPI backend (WebSocket + REST + auth)
#   atmos-frontend  Nginx serving Vite build
#   influxdb        Time-series telemetry store
#   grafana         Long-term dashboards (telemetry history, alerts)
#   redis           Rate limiting, session cache, command queue
#   traefik         Reverse proxy + TLS termination (Let's Encrypt)
#
# First-run setup:
#   1. cp .env.example .env  && edit values
#   2. docker compose pull
#   3. docker compose up -d
#   4. Visit https://your-domain.com
###############################################################################

version: "3.9"

networks:
  atmos-net:
    driver: bridge
  monitoring-net:
    driver: bridge

volumes:
  influx-data:
  influx-config:
  grafana-data:
  redis-data:
  traefik-certs:

services:

  # ─── Reverse proxy + TLS ──────────────────────────────────────────────────
  traefik:
    image: traefik:v3.1
    container_name: atmos-traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/certs/acme.json"
      - "--log.level=WARN"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/certs
    networks: [atmos-net]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.traefik.tls.certresolver=le"
      - "traefik.http.routers.traefik.middlewares=auth-mw"
      - "traefik.http.middlewares.auth-mw.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"

  # ─── FastAPI backend ───────────────────────────────────────────────────────
  atmos-api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: atmos-api
    restart: unless-stopped
    environment:
      ATMOS_SECRET_KEY: ${ATMOS_SECRET_KEY}
      ATMOS_ACCESS_TOKEN_EXPIRE_MINUTES: ${ATMOS_ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG:-atmos}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-atmos_telemetry}
      REDIS_URL: redis://redis:6379
      ATMOS_CORS_ORIGINS: "https://${DOMAIN},https://app.${DOMAIN}"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      influxdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [atmos-net, monitoring-net]
    labels:
      - "traefik.enable=true"
      # REST API
      - "traefik.http.routers.api.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`, `/auth`)"
      - "traefik.http.routers.api.tls.certresolver=le"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
      # WebSocket (needs separate router for upgrade headers)
      - "traefik.http.routers.ws.rule=Host(`${DOMAIN}`) && PathPrefix(`/ws`)"
      - "traefik.http.routers.ws.tls.certresolver=le"
      - "traefik.http.middlewares.ws-upgrade.headers.customrequestheaders.Connection=keep-alive, Upgrade"
      - "traefik.http.routers.ws.middlewares=ws-upgrade"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── React frontend ────────────────────────────────────────────────────────
  atmos-frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://${DOMAIN}
        VITE_WS_URL: wss://${DOMAIN}
    container_name: atmos-frontend
    restart: unless-stopped
    networks: [atmos-net]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.frontend.tls.certresolver=le"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  # ─── InfluxDB v2 ────────────────────────────────────────────────────────────
  influxdb:
    image: influxdb:2.7-alpine
    container_name: atmos-influxdb
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_ADMIN_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_ADMIN_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG:-atmos}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET:-atmos_telemetry}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN}
      INFLUXD_LOG_LEVEL: warn
    volumes:
      - influx-data:/var/lib/influxdb2
      - influx-config:/etc/influxdb2
      # Place .flux or .sh initialisation scripts in influx/init/;
      # InfluxDB executes them in lexicographic order on first startup.
      - ./influx/init:/docker-entrypoint-initdb.d
    networks: [atmos-net, monitoring-net]
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.influx.rule=Host(`influx.${DOMAIN}`)"
      - "traefik.http.routers.influx.tls.certresolver=le"
      - "traefik.http.services.influx.loadbalancer.server.port=8086"

  # ─── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana-oss:11.1.0
    container_name: atmos-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://grafana.${DOMAIN}
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_LOG_LEVEL: warn
      # Required for datasource provisioning (influxdb.yml uses plain $VAR
      # syntax; shell-style ${VAR:-default} is not expanded by Grafana).
      INFLUX_URL: http://influxdb:8086
      INFLUX_ORG: ${INFLUX_ORG:-atmos}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-atmos_telemetry}
      INFLUX_TOKEN: ${INFLUX_TOKEN}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - influxdb
    networks: [atmos-net, monitoring-net]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN}`)"
      - "traefik.http.routers.grafana.tls.certresolver=le"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  # ─── Redis (session cache + rate limiter + command queue) ──────────────────
  redis:
    image: redis:7.2-alpine
    container_name: atmos-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks: [atmos-net]
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3